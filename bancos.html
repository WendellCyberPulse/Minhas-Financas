        <!-- RESUMO TOTAL EM BANCOS -->
    <section>
        <h2>💰 Resumo do seu dinheiro</h2>

        <div class="cards-container">
            <!-- Card Saldo Total -->
            <div class="card">
                <h3>Saldo Total</h3>
                <p id="saldoTotalBancos">R$ 0,00</p>
                 <small>Total em <span id="totalBancos">0</span> bancos</small>
            </div>
        </div>
        
        
    </section>

        <!-- FORMULÁRIO PARA CADASTRAR NOVO BANCO -->
    <section>
        <h2>➕ Cadastrar novo banco</h2>

        <div class="form-container">
        
            <form id="formBanco">
                <!-- Nome do banco -->
                <div>
                    <label for="nomeBanco">Nome do banco:</label><br>
                    <input type="text" id="nomeBanco" placeholder="Ex: Nubank, Itaú, Caixa..." required>
                </div>

                <!-- Tipo de conta -->
                <div>
                    <label for="tipoConta">Tipo de conta:</label><br>
                    <select id="tipoConta">
                        <option value="corrente">Conta Corrente</option>
                        <option value="poupanca">Poupança</option>
                        <option value="investimento">Investimentos</option>
                    </select>
                </div>

                <!-- Saldo atual -->
                <div>
                    <label for="saldoAtual">Saldo atual (R$):</label><br>
                    <input type="number" id="saldoAtual" step="0.01" placeholder="0,00" required>
                </div>

                <!-- Botão salvar -->
                <div style="display: flex; gap: 10px;">
                    <button type="submit" id="btnSalvarBanco">💾 Salvar banco</button>
                    <button type="button" onclick="cancelarEdicao()" class="btn-cancelar">❌ Cancelar</button>
                </div>
            </form>
        </div>
    </section>

        <!-- LISTA DE BANCOS CADASTRADOS -->
    <section>
        <h2>📋 Minhas contas</h2>
        
        <!-- Cabeçalho da lista -->
        <div class="lista-header">
            <span>Banco</span>
            <span>Tipo</span>
            <span>Saldo</span>
            <span>Ações</span>
        </div>
        
        <div id="listaBanco">

        </div>
    </section>
